# Drop-in : /etc/systemd/system/bluetooth.service.d/bluetooth-compat.conf
# Active le mode "compat" de bluetoothd pour autoriser sdptool a publier le
# profil Serial Port (SPP) utilise par la console serie Bluetooth de meshui.
[Service]
ExecStart=
ExecStart=/usr/libexec/bluetooth/bluetoothd --compat
