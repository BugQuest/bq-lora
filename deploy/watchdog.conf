# Watchdog materiel bq-lora-ui. A installer dans
# /etc/systemd/system.conf.d/99-bq-lora-ui-watchdog.conf
#
# Raspberry Pi OS active deja le watchdog par defaut (40-rpi-enable-watchdog.conf,
# 1min/2min). On reaffirme ici de facon DETERMINISTE (prefixe 99- -> applique en
# dernier, gagne sur le 40- du vendor et sur une image qui ne l'aurait pas).
#
# Timeout = 1min : NE PAS descendre plus bas. Un update-initramfs / gros apt sur
# la carte SD lente du Pi Zero 2 W peut affamer PID1 >20s -> un timeout trop
# court (teste a 20s) declenche un reset materiel EN PLEINE operation. 1min est
# la valeur eprouvee par RPi OS, qui survit aux maj noyau/initramfs.
#
# systemd ouvre /dev/watchdog (arme par dtparam=watchdog=on dans config.txt) et
# le caresse toutes les ~RuntimeWatchdogSec/2. Si systemd lui-meme ou le noyau se
# fige et cesse de caresser, le watchdog materiel (bcm2835) reset le Pi seul.
# RebootWatchdogSec couvre en plus un reboot/shutdown qui resterait bloque.
[Manager]
RuntimeWatchdogSec=1min
RebootWatchdogSec=2min
