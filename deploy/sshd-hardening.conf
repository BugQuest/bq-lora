# Durcissement SSH bq-lora-ui. A installer dans
# /etc/ssh/sshd_config.d/10-bq-lora-ui.conf (charge par le sshd Debian).
#
# L'auth par mot de passe est deja desactivee par defaut sur cette image
# (cle uniquement) ; on le re-affirme et on interdit le login root.
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
# Pas de transfert X11 / agent (surface inutile sur un appareil headless).
X11Forwarding no
AllowAgentForwarding no
