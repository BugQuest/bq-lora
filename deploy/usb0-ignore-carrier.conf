# NetworkManager : ignorer le carrier sur l'interface du gadget USB (usb0).
#
# Probleme resolu : usb0 est une interface "serveur" (mode shared, 10.42.1.1,
# DHCP/NAT pour le PC). Par defaut NM refuse de l'activer tant qu'il n'y a pas
# de carrier ; or cote gadget le carrier n'apparait que lorsque le Pi a deja
# monte usb0 -> deadlock au boot : NM laisse usb0 down, le PC voit "cable
# debranche" et n'obtient jamais d'IP.
#
# ignore-carrier=yes -> NM monte usb0 inconditionnellement des le boot, le
# gadget presente alors le lien "up" a l'hote (Windows) qui se connecte et
# recupere son bail DHCP automatiquement, sans aucune manip.
#
# Installe vers /etc/NetworkManager/conf.d/10-usb0-ignore-carrier.conf
[device-usb0]
match-device=interface-name:usb0
ignore-carrier=yes
